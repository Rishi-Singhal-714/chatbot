    function createStandardFieldInput(field, value, displayField) {
        let inputHtml = '';
        
        if (field.toLowerCase().includes('description') || 
            field.toLowerCase().includes('bio') ||
            field.toLowerCase().includes('content') ||
            field.toLowerCase().includes('address') ||
            field.toLowerCase().includes('note') ||
            field.toLowerCase().includes('announcement') ||
            (String(value).length > 100 && !field.toLowerCase().includes('image'))) {
            inputHtml = `
                <textarea id="editValue" name="${field}" class="form-control" rows="4" 
                          placeholder="Enter ${displayField.toLowerCase()}...">${escapeHtml(value)}</textarea>
            `;
        } else if (field.toLowerCase().includes('toggle') ||
                  field.toLowerCase().includes('status') ||
                  field.toLowerCase().includes('active') ||
                  field.toLowerCase().includes('enabled') ||
                  field.toLowerCase().includes('verified') ||
                  field.toLowerCase().includes('is_')) {
            const isChecked = value === true || value === 1 || value === '1' || 
                             String(value).toLowerCase() === 'true' || 
                             String(value).toLowerCase() === 'yes' ||
                             String(value).toLowerCase() === 'active' ||
                             String(value).toLowerCase() === 'on';
            inputHtml = `
                <div style="display: flex; align-items: center; gap: 15px; padding: 12px; background: #f8f9fa; border-radius: 5px;">
                    <input type="checkbox" id="editValue" name="${field}" ${isChecked ? 'checked' : ''} 
                           class="form-control" style="width: auto; transform: scale(1.3);">
                    <span style="color: #666; font-size: 14px;">
                        ${isChecked ? 'Currently: Active/Yes' : 'Currently: Inactive/No'}
                    </span>
                </div>
            `;
        } else if (field.toLowerCase().includes('image') || 
                  field.toLowerCase().includes('url') ||
                  field.toLowerCase().includes('avatar') ||
                  field.toLowerCase().includes('photo') ||
                  field.toLowerCase().includes('thumbnail') ||
                  field.toLowerCase().includes('link') ||
                  field.toLowerCase().includes('website') ||
                  field.toLowerCase().includes('profile') ||
                  (field === 'value' && value && (value.startsWith('http://') || value.startsWith('https://')))) {
            inputHtml = `
                <input type="url" id="editValue" name="${field}" value="${escapeHtml(value)}" 
                       class="form-control" placeholder="https://example.com/image.jpg">
                ${value ? `<div style="margin-top: 10px; font-size: 12px; color: #666;">
                    <a href="${escapeHtml(value)}" target="_blank" style="color: #2196F3; text-decoration: none;">🔗 Open Link</a>
                </div>` : ''}
            `;
        } else if (field.toLowerCase().includes('email')) {
            inputHtml = `
                <input type="email" id="editValue" name="${field}" value="${escapeHtml(value)}" 
                       class="form-control" placeholder="user@example.com">
            `;
        } else if (field.toLowerCase().includes('phone') ||
                  field.toLowerCase().includes('mobile') ||
                  field.toLowerCase().includes('contact')) {
            inputHtml = `
                <input type="tel" id="editValue" name="${field}" value="${escapeHtml(value)}" 
                       class="form-control" placeholder="+91 9876543210">
            `;
        } else if (field.toLowerCase().includes('date') ||
                  field.toLowerCase().includes('created') ||
                  field.toLowerCase().includes('updated') ||
                  field.toLowerCase().includes('joined') ||
                  field.toLowerCase().includes('birthday') ||
                  field.toLowerCase().includes('dob')) {
            let dateValue = value;
            if (value) {
                const date = new Date(value);
                if (!isNaN(date.getTime())) {
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    dateValue = `${year}-${month}-${day}T${hours}:${minutes}`;
                }
            }
            inputHtml = `
                <input type="datetime-local" id="editValue" name="${field}" value="${dateValue}" 
                       class="form-control">
            `;
        } else if (field.toLowerCase().includes('password') ||
                  field.toLowerCase().includes('token') ||
                  field.toLowerCase().includes('secret') ||
                  field.toLowerCase().includes('key')) {
            inputHtml = `
                <input type="password" id="editValue" name="${field}" value="${escapeHtml(value)}" 
                       class="form-control" placeholder="Enter ${displayField.toLowerCase()}...">
            `;
        } else {
            inputHtml = `
                <input type="text" id="editValue" name="${field}" value="${escapeHtml(value)}" 
                       class="form-control" placeholder="Enter ${displayField.toLowerCase()}...">
            `;
        }
        
        return inputHtml;
    }
    
    // Image gallery functions
    function viewAllImages(images) {
        const imageObjects = images.map((url, index) => ({ url, index }));
        openImageViewer(imageObjects, 0);
    }
    
    function previewImageInGallery(index, images) {
        const mainPreviewImg = document.getElementById('mainPreviewImg');
        const compactGallery = document.getElementById('compactGallery');
        
        if (!mainPreviewImg || !compactGallery) return;
        
        // Update main preview
        mainPreviewImg.src = images[index];
        
        // Update navigation text
        const previewNav = document.querySelector('.preview-navigation');
        if (previewNav) {
            const navText = previewNav.querySelector('span');
            if (navText) {
                navText.textContent = `${index + 1} / ${images.length}`;
            }
        }
        
        // Update preview info
        const previewInfo = document.querySelector('.preview-info');
        if (previewInfo) {
            const imageNumber = previewInfo.querySelector('div strong');
            const previewUrl = previewInfo.querySelector('.preview-url');
            const copyBtn = previewInfo.querySelector('.preview-action-btn[onclick*="copyImageLink"]');
            const openBtn = previewInfo.querySelector('.preview-action-btn[onclick*="window.open"]');
            
            if (imageNumber) {
                imageNumber.parentElement.innerHTML = `<strong>Image ${index + 1}</strong> of ${images.length}`;
            }
            if (previewUrl) {
                previewUrl.textContent = images[index].substring(0, 100) + (images[index].length > 100 ? '...' : '');
            }
            if (copyBtn) {
                copyBtn.onclick = () => copyImageLink(images[index]);
            }
            if (openBtn) {
                openBtn.onclick = () => window.open(images[index], '_blank');
            }
        }
        
        // Update active thumbnail
        const thumbnails = compactGallery.querySelectorAll('.compact-thumbnail');
        thumbnails.forEach((thumb, i) => {
            if (i === index) {
                thumb.classList.add('active');
            } else {
                thumb.classList.remove('active');
            }
        });
    }
    
    function navigatePreview(direction, images) {
        const compactGallery = document.getElementById('compactGallery');
        if (!compactGallery) return;
        
        const thumbnails = compactGallery.querySelectorAll('.compact-thumbnail');
        let currentIndex = -1;
        
        thumbnails.forEach((thumb, index) => {
            if (thumb.classList.contains('active')) {
                currentIndex = index;
            }
        });
        
        if (currentIndex === -1) currentIndex = 0;
        
        let newIndex = currentIndex + direction;
        if (newIndex < 0) newIndex = images.length - 1;
        if (newIndex >= images.length) newIndex = 0;
        
        previewImageInGallery(newIndex, images);
    }
    
    function copyImageLink(url) {
        navigator.clipboard.writeText(url)
            .then(() => {
                showMessage('✅ Image URL copied to clipboard!', 'success');
            })
            .catch(err => {
                console.error('Failed to copy URL:', err);
                showMessage('❌ Failed to copy URL', 'error');
            });
    }
    
    // Image viewer functions
    function openImageViewer(images, startIndex = 0) {
        viewerImages = images;
        currentViewerIndex = startIndex;
        isViewerOpen = true;
        
        document.getElementById('imageViewerModal').style.display = 'block';
        updateViewer();
        
        // Prevent body scroll
        document.body.style.overflow = 'hidden';
    }
    
    function closeImageViewer() {
        document.getElementById('imageViewerModal').style.display = 'none';
        isViewerOpen = false;
        viewerImages = [];
        
        // Restore body scroll
        document.body.style.overflow = 'auto';
    }
    
    function updateViewer() {
        if (viewerImages.length === 0) return;
        
        const image = viewerImages[currentViewerIndex];
        const mainImg = document.getElementById('mainViewerImage');
        const imageCounter = document.getElementById('imageCounter');
        const imageInfo = document.getElementById('imageInfo');
        const thumbnailSidebar = document.getElementById('thumbnailSidebar');
        
        // Update main image
        mainImg.src = image.url;
        mainImg.alt = `Image ${currentViewerIndex + 1}`;
        
        // Update counter
        imageCounter.textContent = `${currentViewerIndex + 1} / ${viewerImages.length}`;
        
        // Update info
        document.getElementById('imageName').textContent = `Image ${currentViewerIndex + 1}`;
        document.getElementById('imageUrl').textContent = image.url;
        
        // Update thumbnails
        thumbnailSidebar.innerHTML = '';
        viewerImages.forEach((img, index) => {
            const thumbnail = document.createElement('div');
            thumbnail.className = `thumbnail-item ${index === currentViewerIndex ? 'active' : ''}`;
            thumbnail.innerHTML = `
                <img src="${img.url}" class="thumbnail-img" alt="Thumbnail ${index + 1}">
                <div class="thumbnail-index">${index + 1}</div>
            `;
            thumbnail.onclick = () => goToImage(index);
            thumbnailSidebar.appendChild(thumbnail);
        });
        
        // Scroll active thumbnail into view
        const activeThumbnail = thumbnailSidebar.querySelector('.thumbnail-item.active');
        if (activeThumbnail) {
            activeThumbnail.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
    
    function nextImage() {
        if (viewerImages.length === 0) return;
        currentViewerIndex = (currentViewerIndex + 1) % viewerImages.length;
        updateViewer();
    }
    
    function prevImage() {
        if (viewerImages.length === 0) return;
        currentViewerIndex = (currentViewerIndex - 1 + viewerImages.length) % viewerImages.length;
        updateViewer();
    }
    
    function goToImage(index) {
        if (index >= 0 && index < viewerImages.length) {
            currentViewerIndex = index;
            updateViewer();
        }
    }
    
    function copyImageUrl() {
        if (viewerImages.length === 0) return;
        
        const url = viewerImages[currentViewerIndex].url;
        navigator.clipboard.writeText(url)
            .then(() => {
                showMessage('✅ Image URL copied to clipboard!', 'success');
            })
            .catch(err => {
                console.error('Failed to copy URL:', err);
                showMessage('❌ Failed to copy URL', 'error');
            });
    }
    
    function openImageInNewTab() {
        if (viewerImages.length === 0) return;
        
        const url = viewerImages[currentViewerIndex].url;
        window.open(url, '_blank');
    }
    
    function downloadImage() {
        if (viewerImages.length === 0) return;
        
        const url = viewerImages[currentViewerIndex].url;
        const link = document.createElement('a');
        link.href = url;
        link.download = `image_${currentViewerIndex + 1}_${Date.now()}.${getFileExtension(url)}`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    function getFileExtension(url) {
        const match = url.match(/\.([a-z0-9]+)(?:[?#]|$)/i);
        return match ? match[1].toLowerCase() : 'jpg';
    }
    
    // Image link management functions
    function addImageLink(url = '') {
        const container = document.getElementById('imageLinksContainer');
        if (!container) return;
        
        const index = container.children.length;
        
        const newItem = document.createElement('div');
        newItem.className = 'image-link-item';
        newItem.setAttribute('data-index', index);
        newItem.innerHTML = `
            <input type="text" class="image-link-input" 
                   value="${escapeHtml(url)}" 
                   placeholder="https://example.com/image.jpg"
                   onchange="updateImagePreview(this)">
            <button type="button" class="remove-link-btn" onclick="removeImageLink(this)">×</button>
        `;
        
        container.appendChild(newItem);
        
        const newInput = newItem.querySelector('.image-link-input');
        if (newInput && !url) newInput.focus();
        
        updateLinkCount();
        updateGalleryAfterChange();
        
        // Scroll to the new item
        newItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function removeImageLink(button) {
        const item = button.closest('.image-link-item');
        if (item) {
            item.remove();
            
            const container = document.getElementById('imageLinksContainer');
            const items = container.querySelectorAll('.image-link-item');
            items.forEach((item, index) => {
                item.setAttribute('data-index', index);
            });
            
            updateLinkCount();
            updateGalleryAfterChange();
        }
    }
    
    function updateImagePreview(input) {
        const item = input.closest('.image-link-item');
        if (item) {
            updateGalleryAfterChange();
        }
    }
    
    function updateLinkCount() {
        const container = document.getElementById('imageLinksContainer');
        if (!container) return;
        
        const count = container.children.length;
        
        let countElement = document.querySelector('.link-count');
        if (!countElement) {
            countElement = document.createElement('div');
            countElement.className = 'link-count';
            container.parentNode.insertBefore(countElement, container);
        }
        
        countElement.textContent = `Currently ${count} image link${count !== 1 ? 's' : ''}`;
    }
    
    function updateGalleryAfterChange() {
        const container = document.getElementById('imageLinksContainer');
        if (!container) return;
        
        const inputs = container.querySelectorAll('.image-link-input');
        const images = Array.from(inputs).map(input => input.value.trim()).filter(url => url);
        
        // Update stats
        const statsElements = document.querySelectorAll('.stats-value');
        if (statsElements.length >= 2) {
            statsElements[0].textContent = images.length;
            statsElements[1].textContent = images.length;
        }
        
        // Update link count
        const linkCountElement = document.querySelector('.link-count');
        if (linkCountElement) {
            linkCountElement.textContent = `Currently ${images.length} image link${images.length !== 1 ? 's' : ''}`;
        }
        
        // Update view all button
        const viewAllBtn = document.querySelector('.view-all-btn');
        if (viewAllBtn && images.length > 0) {
            viewAllBtn.style.display = 'flex';
            viewAllBtn.onclick = () => viewAllImages(images);
        } else if (viewAllBtn) {
            viewAllBtn.style.display = 'none';
        }
        
        // Rebuild compact gallery if it exists
        const compactGallery = document.getElementById('compactGallery');
        if (compactGallery) {
            compactGallery.innerHTML = '';
            images.forEach((url, index) => {
                const thumbnail = document.createElement('div');
                thumbnail.className = `compact-thumbnail ${index === 0 ? 'active' : ''}`;
                thumbnail.onclick = () => previewImageInGallery(index, images);
                thumbnail.title = `Click to preview • ${url.substring(0, 50)}...`;
                thumbnail.innerHTML = `
                    <img src="${escapeHtml(url)}" 
                         class="compact-img" 
                         alt="Image ${index + 1}"
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiNlZGVkZWQiIHJ4PSI1Ii8+PHBhdGggZD0iTTMwIDQwTDUwIDYwTDcwIDQwIiBzdHJva2U9IiM5OTkiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+PGNpcmNsZSBjeD0iNTAiIGN5PSIzNSIgcj0iMTAiIHN0cm9rZT0iIzk5OSIgc3Ryb2tlLXdpZHRoPSIyIi8+PC9zdmc+'">
                    <div class="compact-index">${index + 1}</div>
                `;
                compactGallery.appendChild(thumbnail);
            });
            
            // Update main preview
            if (images.length > 0) {
                const mainPreviewImg = document.getElementById('mainPreviewImg');
                if (mainPreviewImg) {
                    mainPreviewImg.src = images[0];
                }
                
                // Update preview info
                const previewInfo = document.querySelector('.preview-info');
                if (previewInfo) {
                    const imageNumber = previewInfo.querySelector('div strong');
                    const previewUrl = previewInfo.querySelector('.preview-url');
                    
                    if (imageNumber) {
                        imageNumber.parentElement.innerHTML = `<strong>Image 1</strong> of ${images.length}`;
                    }
                    if (previewUrl) {
                        previewUrl.textContent = images[0].substring(0, 100) + (images[0].length > 100 ? '...' : '');
                    }
                }
                
                // Update navigation
                const previewNav = document.querySelector('.preview-navigation');
                if (previewNav) {
                    const navText = previewNav.querySelector('span');
                    if (navText) {
                        navText.textContent = `1 / ${images.length}`;
                    }
                    if (images.length > 1) {
                        previewNav.style.display = 'flex';
                    } else {
                        previewNav.style.display = 'none';
                    }
                }
            }
        }
        
        // Show/hide no images placeholder
        const noImagesPlaceholder = document.querySelector('.no-images-placeholder');
        if (noImagesPlaceholder) {
            noImagesPlaceholder.style.display = images.length === 0 ? 'block' : 'none';
        }
        
        // Show/hide gallery sections
        const gallerySections = document.querySelectorAll('.image-stats, .compact-gallery, .main-preview-section');
        gallerySections.forEach(section => {
            if (section) {
                section.style.display = images.length > 0 ? 'block' : 'none';
            }
        });
    }
    
    document.getElementById('editForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        let newValue;
        
        if (currentEditField === 'club_slider_images') {
            const container = document.getElementById('imageLinksContainer');
            if (!container) {
                showMessage('❌ Error: Image links container not found', 'error');
                return;
            }
            
            const imageLinks = [];
            const inputs = container.querySelectorAll('.image-link-input');
            inputs.forEach(input => {
                if (input.value.trim() !== '') {
                    imageLinks.push(input.value.trim());
                }
            });
            
            newValue = JSON.stringify(imageLinks);
            
            if (newValue === originalValue) {
                showMessage('ℹ️ No changes detected', 'info');
                closeModal();
                return;
            }
        } else {
            const input = document.getElementById('editValue');
            if (!input) {
                showMessage('❌ Error: Input field not found', 'error');
                return;
            }
            
            if (input.type === 'checkbox') {
                newValue = input.checked ? 1 : 0;
            } else {
                newValue = input.value.trim();
                
                if (newValue === '') {
                    newValue = null;
                }
            }
            
            if (JSON.stringify(newValue) === JSON.stringify(originalValue)) {
                showMessage('ℹ️ No changes detected', 'info');
                closeModal();
                return;
            }
        }
        
        try {
            showMessage('🔄 Saving changes...', 'info');
            
            const updateData = {};
            updateData[currentEditField] = newValue;
            
            console.log('Updating config ID:', currentEditId, 'Field:', currentEditField, 'Data:', updateData);
            
            const endpoint = `/api/${currentTable}/${currentEditId}`;
            
            const response = await fetch(endpoint, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(updateData)
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            
            const result = await response.json();
            console.log('Update result:', result);
            
            if (result.success) {
                showMessage('✅ Field updated successfully!', 'success');
                
                const configIndex = allData.findIndex(config => {
                    const configIds = [
                        config.id,
                        config._id,
                        config.config_id,
                        config.configId,
                        config.ID
                    ];
                    return configIds.some(id => id == currentEditId);
                });
                
                if (configIndex !== -1) {
                    allData[configIndex][currentEditField] = newValue;
                    
                    if (currentEditField === 'club_slider_images' && newValue) {
                        try {
                            allData[configIndex].parsed_images = JSON.parse(newValue);
                        } catch (e) {
                            allData[configIndex].parsed_images = null;
                        }
                    }
                    
                    applyFilter();
                } else {
                    console.warn('Config not found in local data, reloading from server...');
                    await loadData();
                }
                
                setTimeout(() => {
                    closeModal();
                }, 1000);
            } else {
                throw new Error(result.error || 'Update failed');
            }
        } catch (error) {
            console.error('Update error:', error);
            showMessage(`❌ Error: ${error.message}`, 'error');
        }
    });
    
    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        currentEditId = null;
        currentEditField = null;
        originalValue = null;
        // Reset upload elements
        const uploadInput = document.getElementById('imageUploadInput');
        const uploadPreview = document.getElementById('imageUploadPreview');
        const uploadStatus = document.getElementById('uploadStatus');
        if (uploadInput) uploadInput.value = '';
        if (uploadPreview) {
            uploadPreview.src = '';
            uploadPreview.style.display = 'none';
        }
        if (uploadStatus) uploadStatus.innerHTML = '';
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                <span style="font-size: 24px;">⚠️</span>
                <div>${message}</div>
            </div>
        `;
    }
    
    function showMessage(text, type = 'success') {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = text;
        
        const colors = {
            success: { bg: '#d4edda', text: '#155724', border: '#c3e6cb' },
            error: { bg: '#f8d7da', text: '#721c24', border: '#f5c6cb' },
            info: { bg: '#fff3cd', text: '#856404', border: '#ffeaa7' }
        };
        
        const color = colors[type] || colors.success;
        messageDiv.style.background = color.bg;
        messageDiv.style.color = color.text;
        messageDiv.style.border = `1px solid ${color.border}`;
        messageDiv.style.opacity = '1';
        
        setTimeout(() => {
            messageDiv.style.opacity = '0';
            setTimeout(() => {
                messageDiv.textContent = '';
            }, 300);
        }, 3000);
    }
    
    // Event listeners
    window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target === modal) {
            closeModal();
        }
        
        const viewerModal = document.getElementById('imageViewerModal');
        if (event.target === viewerModal) {
            closeImageViewer();
        }
    };
    
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            if (isViewerOpen) {
                closeImageViewer();
            } else {
                closeModal();
            }
        }
        
        // Image viewer navigation
        if (isViewerOpen) {
            switch(event.key) {
                case 'ArrowLeft':
                    prevImage();
                    event.preventDefault();
                    break;
                case 'ArrowRight':
                    nextImage();
                    event.preventDefault();
                    break;
                case ' ':
                    event.preventDefault();
                    break;
            }
        }
    });
    
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('pageSize').value = pageSize;
        loadData();
    });
</script>
</body>
